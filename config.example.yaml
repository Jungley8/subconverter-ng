# subconverter-ng application config (all fields optional).
# Per-request behaviour is driven by URL parameters; this file only sets the
# server defaults. Environment variables override these:
#   SUBNG_LISTEN, SUBNG_PROXY, SUBNG_FLARESOLVERR_URL, SUBNG_USER_AGENT,
#   SUBNG_RATELIMIT_ENABLED, SUBNG_RATELIMIT_RPM, SUBNG_RATELIMIT_BURST

listen: ":25500"

fetch:
  # User-Agent sent when fetching subscriptions/rulesets. Many panels only
  # return nodes for a clash-like UA. Leave empty to use the built-in default.
  user_agent: ""

  # Upstream proxy for airports unreachable directly from this host.
  #   http://127.0.0.1:7890   or   socks5://127.0.0.1:1080
  proxy: ""

  # FlareSolverr endpoint to pass Cloudflare's JS challenge. Empty disables it.
  #   http://127.0.0.1:8191/v1
  flaresolverr_url: ""

  # Per-fetch timeout.
  timeout: 30s

# Per-client-IP rate limiting for the /sub endpoint. Each /sub request fans out
# into many upstream fetches, so this protects the instance from abuse. Only
# /sub is throttled; /version and the web UI are never limited. The client IP is
# taken from X-Forwarded-For (first hop) or X-Real-IP when present (for setups
# behind Cloudflare / nginx), otherwise the connection's remote address.
ratelimit:
  # When false, the limiter is disabled entirely (no-op pass-through).
  enabled: true

  # Sustained request budget per client IP, in requests per minute. Tokens
  # refill continuously at this rate.
  requests_per_minute: 30

  # Maximum burst: how many requests a fresh/idle client may make back-to-back
  # before the per-minute rate applies. Generous enough for normal client
  # refreshes from a personal instance.
  burst: 10
